name: Hourly WV House Sync

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger protected ingestion endpoint
        env:
          CRON_INGEST_URL: ${{ secrets.CRON_INGEST_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_INGEST_URL" ]; then
            echo "Missing CRON_INGEST_URL secret"
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "Missing CRON_SECRET secret"
            exit 1
          fi

          http_code=$(curl --silent --show-error \
            --output response.json \
            --write-out "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$CRON_INGEST_URL")

          echo "HTTP status: $http_code"
          echo "Response body:"
          cat response.json
          echo

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            exit 1
          fi
